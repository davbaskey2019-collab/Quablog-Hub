kind = "web"
previewPath = "/"
title = "Quablog"
version = "1.0.0"
id = "artifacts/quablog"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25101
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/quablog run dev"

[services.env]
PORT = "25101"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/quablog", "run", "build"]
publicDir = "artifacts/quablog/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
